version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_ENV_VARIABLES_ALLOWED_TO_READ=GEMINI_API_KEY,SLACK_WEBHOOK_URL
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
